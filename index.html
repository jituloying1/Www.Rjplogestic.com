<!DOCTYPE html>
<html>
<head>
<title>Professional Job Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; margin:0; }
.container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.2);}
h2 { text-align: center; color: #333; }
label { display:block; margin-top:15px; font-weight: bold; color:#555; }
input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
button { margin-top:20px; padding:10px 20px; border:none; background:#4CAF50; color:white; font-size:16px; border-radius:5px; cursor:pointer; }
button:hover { background:#45a049; }
small { color:red; }
</style>
</head>
<body>

<div class="container">
  <h2>Job Application Form</h2>
  <form id="jobForm">
    <label>Name</label>
    <input type="text" id="name" required>

    <label>Father Name</label>
    <input type="text" id="father" required>

    <label>Mother Name</label>
    <input type="text" id="mother" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Phone</label>
    <input type="tel" id="phone" required>

    <label>Qualification</label>
    <select id="qualification" required>
      <option value="">Select</option>
      <option>Class 8</option>
      <option>Class 9</option>
      <option>Class 10</option>
      <option>Class 11</option>
      <option>Class 12</option>
      <option>BA</option>
      <option>MA</option>
    </select>

    <label>Photo (max 50KB)</label>
    <input type="file" id="photo" accept="image/*" required>

    <label>Signature (max 20KB)</label>
    <input type="file" id="signature" accept="image/*" required>

    <label>Admit Card</label>
    <input type="file" id="admitcard" accept=".pdf,.jpg,.png" required>

    <label>Marksheet</label>
    <input type="file" id="marksheet" accept=".pdf,.jpg,.png" required>

    <label>Caste Certificate</label>
    <input type="file" id="castecertificate" accept=".pdf,.jpg,.png" required>

    <button type="submit">Submit Application</button>
    <small id="status"></small>
  </form>
</div>

<script>
const form = document.getElementById('jobForm');
const statusText = document.getElementById('status');

function fileToBase64(file, maxSizeKB) {
  return new Promise((resolve, reject) => {
    if(file.size/1024 > maxSizeKB) {
      reject(file.name + " exceeds " + maxSizeKB + "KB");
    }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = err => reject(err);
    reader.readAsDataURL(file);
  });
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  statusText.textContent = "";

  try {
    const data = {
      name: document.getElementById('name').value,
      father: document.getElementById('father').value,
      mother: document.getElementById('mother').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      qualification: document.getElementById('qualification').value,
      photo: await fileToBase64(document.getElementById('photo').files[0], 50),
      signature: await fileToBase64(document.getElementById('signature').files[0], 20),
      admitcard: await fileToBase64(document.getElementById('admitcard').files[0], 2000),
      marksheet: await fileToBase64(document.getElementById('marksheet').files[0], 2000),
      castecertificate: await fileToBase64(document.getElementById('castecertificate').files[0], 2000)
    };

    const response = await fetch("YOUR_SCRIPT_URL_HERE", {
      method: "POST",
      body: JSON.stringify(data),
      headers: { "Content-Type": "application/json" }
    });

    const result = await response.json();
    if(result.status === 'success') {
      alert("Application Submitted Successfully");
      form.reset();
    } else {
      statusText.textContent = "Error: " + result.message;
    }

  } catch(err) {
    statusText.textContent = "Error: " + err;
  }
});
</script>

</body>
</html>
